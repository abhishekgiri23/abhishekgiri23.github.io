<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Preparation Checklist</title>
    <!-- Tailwind CSS for modern responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font Family for clean UI look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        
        /* Custom Checkbox Styling */
        .custom-checkbox {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.5em;
            height: 1.5em;
            border: 2px solid #cbd5e1;
            border-radius: 0.35em;
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .custom-checkbox::before {
            content: "";
            width: 0.85em;
            height: 0.85em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked {
            background-color: #10b981;
            border-color: #10b981;
        }

        .custom-checkbox:checked::before {
            transform: scale(1);
        }

        .item-row {
            transition: all 0.2s ease;
        }

        /* Smooth custom transitions for modern modal popups */
        .modal-active {
            opacity: 1 !important;
            pointer-events: auto !important;
            transform: scale(1) !important;
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen pb-20 relative">

    <!-- Header & Overall Progress -->
    <header class="bg-white shadow-sm sticky top-0 z-30 border-b border-slate-100">
        <div class="max-w-4xl mx-auto px-4 py-5 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                        🍼 Baby Preparation Checklist
                    </h1>
                    <p class="text-sm text-slate-500 mt-1">Track and manage your essentials for before, during, and after pregnancy.</p>
                </div>
                <div class="w-full md:w-64 bg-slate-50 border border-slate-100 rounded-xl p-3 shadow-sm">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Total Progress</span>
                        <span id="overall-percentage" class="text-sm font-bold text-emerald-600">0%</span>
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                        <div id="overall-progress-bar" class="bg-emerald-500 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Filters & Reset actions -->
            <div class="flex flex-wrap gap-2 mt-5 items-center justify-between border-t border-slate-100 pt-4">
                <div class="flex gap-2 overflow-x-auto">
                    <button onclick="setFilter('all')" id="btn-all" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-slate-800 text-white transition-colors duration-150">
                        All Items
                    </button>
                    <button onclick="setFilter('pending')" id="btn-pending" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors duration-150">
                        Pending
                    </button>
                    <button onclick="setFilter('completed')" id="btn-completed" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors duration-150">
                        Completed
                    </button>
                </div>
                <button onclick="triggerResetConfirmModal()" class="px-4 py-2 rounded-full text-sm font-medium border border-red-200 text-red-600 hover:bg-red-50 hover:border-red-300 transition-colors flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"></path>
                    </svg>
                    Reset Progress
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-10" id="checklist-container">
        <!-- Sections dynamically loaded by client JavaScript -->
    </main>

    <!-- CUSTOM MODAL: ADD NEW ITEM -->
    <div id="add-item-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform scale-95 transition-all duration-300 border border-slate-100">
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-100 flex items-center justify-between">
                <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                    <span class="p-1 bg-emerald-50 rounded-lg text-emerald-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path>
                        </svg>
                    </span>
                    Add Custom Item
                </h3>
                <button onclick="closeAddItemModal()" class="text-slate-400 hover:text-slate-600 transition-colors p-1 rounded-full hover:bg-slate-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <form id="add-item-form" onsubmit="handleItemSubmit(event)" class="p-6 space-y-4">
                <input type="hidden" id="target-category-id">
                
                <div>
                    <label for="item-title" class="block text-sm font-semibold text-slate-700 mb-1">Item Name *</label>
                    <input type="text" id="item-title" required placeholder="e.g., Baby monitor" class="w-full px-3.5 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent text-sm">
                </div>
                
                <div>
                    <label for="item-desc" class="block text-sm font-semibold text-slate-700 mb-1">Description (Optional)</label>
                    <textarea id="item-desc" placeholder="e.g., Long range, high definition baby camera" rows="3" class="w-full px-3.5 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent text-sm"></textarea>
                </div>

                <div class="flex justify-end gap-2.5 pt-2">
                    <button type="button" onclick="closeAddItemModal()" class="px-4 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700 font-medium text-sm transition-colors">Cancel</button>
                    <button type="submit" class="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm shadow-sm hover:shadow transition-all">Add Item</button>
                </div>
            </form>
        </div>
    </div>

    <!-- CUSTOM CONFIRM MODAL: RESET -->
    <div id="confirm-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden transform scale-95 transition-all duration-300 border border-slate-100">
            <div class="p-6 text-center">
                <div class="w-12 h-12 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-900">Are you absolutely sure?</h3>
                <p class="text-slate-500 text-sm mt-2">This will reset all your checklist progression tracking. Deleted or custom added items will remain preserved.</p>
            </div>
            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-2 text-sm">
                <button onclick="closeConfirmModal()" class="px-4 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700 font-medium transition-colors">Cancel</button>
                <button onclick="executeReset()" class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white font-medium shadow-sm transition-colors">Yes, Reset</button>
            </div>
        </div>
    </div>

    <!-- NOTIFICATION NOTIFY COMPONENT -->
    <div id="toast-message" class="fixed bottom-5 right-5 z-50 transform translate-y-10 opacity-0 pointer-events-none transition-all duration-300 flex items-center gap-2 px-4 py-3 bg-slate-900 text-white rounded-lg shadow-xl text-sm">
        <span id="toast-icon" class="text-emerald-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
        </span>
        <span id="toast-text">Action successful</span>
    </div>

    <script>
        // Default Structural Data
        const defaultChecklistData = [
            {
                id: 'prenatal',
                title: 'Stage 1: Prenatal (Home Preparation)',
                description: 'Set up your home and keep yourself comfortable during pregnancy.',
                color: 'bg-blue-500',
                items: [
                    { id: 'pre-1', title: 'Comfortable maternity bottoms', desc: 'Leggings or pants with a stretchy belly band.' },
                    { id: 'pre-2', title: 'Supportive nursing bras', desc: '2-3 seamless, wire-free bras that grow with you.' },
                    { id: 'pre-3', title: 'Flat, slip-on shoes', desc: 'Easy to put on without bending over.' },
                    { id: 'pre-4', title: 'Prenatal vitamins', desc: 'Supports your health and baby\'s development.' },
                    { id: 'pre-5', title: 'Pregnancy body pillow', desc: 'U-shape or C-shape pillow for comfortable side sleeping.' },
                    { id: 'pre-6', title: 'Belly oil or lotion', desc: 'Moisturizes and soothes stretching, itchy skin.' },
                    { id: 'pre-7', title: 'Infant car seat', desc: 'Non-negotiable safety item, must be installed before labor.' },
                    { id: 'pre-8', title: 'Crib, bassinet, or co-sleeper', desc: 'A safe, flat sleep space for the baby.' },
                    { id: 'pre-9', title: 'Firm baby mattress', desc: 'Must fit the sleep space perfectly with no gaps.' },
                    { id: 'pre-10', title: 'Waterproof mattress protectors (2-3)', desc: 'Essential for keeping the mattress clean from leaks.' },
                    { id: 'pre-11', title: 'Fitted crib sheets (2-3)', desc: 'Must fit tightly over the mattress.' }
                ]
            },
            {
                id: 'hospital',
                title: 'Stage 2: Labor and Delivery (Hospital Bag)',
                description: 'Pack around week 36 so you are ready to go.',
                color: 'bg-purple-500',
                items: [
                    { id: 'hosp-1', title: 'Important documents', desc: 'ID, insurance card, and hospital registration forms.' },
                    { id: 'hosp-2', title: 'Birth plan (printed copies)', desc: 'Simple outline of your preferences for nurses and doctors.' },
                    { id: 'hosp-3', title: 'Comfortable delivery clothes', desc: 'Loose, dark-colored nightgown or oversized t-shirt.' },
                    { id: 'hosp-4', title: 'Post-delivery outfit', desc: 'Loose, soft clothing for recovery and the ride home.' },
                    { id: 'hosp-5', title: 'Robe and slip-on slippers', desc: 'For walking the halls and staying warm.' },
                    { id: 'hosp-6', title: 'Extra-long phone charging cable', desc: '10-foot cord for hard-to-reach hospital outlets.' },
                    { id: 'hosp-7', title: 'Travel toiletries and lip balm', desc: 'Lip balm, toothbrush, hair ties, gentle face wash.' },
                    { id: 'hosp-8', title: 'Going-home outfit (in 2 sizes)', desc: 'Pack one "Newborn" and one "0-3 Months" size outfit.' },
                    { id: 'hosp-9', title: 'Newborn hat and scratch mittens', desc: 'Keeps head warm and prevents accidental face scratches.' },
                    { id: 'hosp-10', title: 'Warm baby blanket', desc: 'To tuck over the baby in the car seat (not under straps).' },
                    { id: 'hosp-11', title: 'Snacks and reusable water bottles', desc: 'For the support person during a long stay.' },
                    { id: 'hosp-12', title: 'Change of clothes & toiletries', desc: 'For your partner or support person.' }
                ]
            },
            {
                id: 'postnatal',
                title: 'Stage 3: Postnatal (Baby Care at Home)',
                description: 'Stock up on these during your 3rd trimester to focus on resting once baby is home.',
                color: 'bg-amber-500',
                items: [
                    { id: 'post-1', title: 'Heavy-duty maternity pads', desc: 'Highly absorbent, soft pads for postpartum bleeding.' },
                    { id: 'post-2', title: 'Peri bottle', desc: 'Angled squirt bottle for gentle cleansing after using the bathroom.' },
                    { id: 'post-3', title: 'Nipple cream', desc: 'Soothing ointment for cracked or sore nipples (if breastfeeding).' },
                    { id: 'post-4', title: 'Comfortable, high-waisted underwear', desc: 'Full coverage, won\'t irritate a C-section incision.' },
                    { id: 'post-5', title: 'Bodysuits / Onesies (6-8)', desc: 'Envelope-style shoulders for easy pulling down during blowouts.' },
                    { id: 'post-6', title: 'Footed sleepsuits / Pajamas (4-6)', desc: 'Zippers are faster and easier than snaps for night changes.' },
                    { id: 'post-7', title: 'Newborn diapers (2-3 packs)', desc: 'Enough for the first two weeks (expect 8-10 changes/day).' },
                    { id: 'post-8', title: 'Fragrance-free baby wipes', desc: 'Gentle wipes for sensitive newborn skin.' },
                    { id: 'post-9', title: 'Hydrophilic cloths / Muslin squares (10-15)', desc: 'Highly absorbent; use as towels, burp cloths, or covers.' },
                    { id: 'post-10', title: 'Baby bathtub', desc: 'Small, supportive tub designed for safe bathing.' },
                    { id: 'post-11', title: 'Changing pad', desc: 'Contoured, wipeable cushion for dresser or changing table.' },
                    { id: 'post-12', title: 'Burp cloths (8-10)', desc: 'Soft fabric to catch spit-up after feeds.' },
                    { id: 'post-13', title: 'Nursing pillow', desc: 'Props baby up for feeding, saving your back and arms.' },
                    { id: 'post-14', title: 'Newborn baby bottles (2-3)', desc: 'Good backup to have, even if planning to breastfeed.' },
                    { id: 'post-15', title: 'Bottle brush', desc: 'Specialized brush to clean inside bottles and nipples.' },
                    { id: 'post-16', title: 'Breast pump (optional)', desc: 'Useful for relieving engorgement or partner feedings.' },
                    { id: 'post-17', title: 'Swaddle blankets or sleep sacks (2-3)', desc: 'Mimics the womb and prevents startle reflex.' },
                    { id: 'post-18', title: 'Pacifiers (2-3)', desc: 'Great for soothing; try a few different shapes.' },
                    { id: 'post-19', title: 'Digital rectal thermometer', desc: 'The most accurate way to check a newborn\'s temperature.' },
                    { id: 'post-20', title: 'Baby nail file or safety clippers', desc: 'Prevents scratches from fast-growing, sharp newborn nails.' },
                    { id: 'post-21', title: 'Vitamin D and K drops', desc: 'Consult your pediatrician for dosage to support health.' }
                ]
            }
        ];

        // Persistence layers: structure of data + checkbox state checked status
        let checklistData = JSON.parse(localStorage.getItem('babyChecklistData')) || defaultChecklistData;
        let userProgress = JSON.parse(localStorage.getItem('babyChecklistProgress')) || {};
        let currentFilter = 'all'; // 'all', 'pending', 'completed'

        // Save progress states to localStorage
        function saveProgress() {
            localStorage.setItem('babyChecklistProgress', JSON.stringify(userProgress));
            updateUI();
        }

        // Save custom/deleted structure changes to localStorage
        function saveStructure() {
            localStorage.setItem('babyChecklistData', JSON.stringify(checklistData));
            updateUI();
        }

        // Show lightweight toast notifications
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast-message');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');

            toastText.textContent = message;
            if (isError) {
                toastIcon.innerHTML = `<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else {
                toastIcon.innerHTML = `<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`;
            }

            toast.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        // Reset check states
        function triggerResetConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            modal.classList.add('modal-active');
        }

        function closeConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            modal.classList.remove('modal-active');
        }

        function executeReset() {
            userProgress = {};
            saveProgress();
            closeConfirmModal();
            showToast('All progress progress has been reset successfully!');
        }

        // Check/Uncheck action
        function toggleItem(itemId) {
            userProgress[itemId] = !userProgress[itemId];
            saveProgress();
        }

        // Filter operations
        function setFilter(filterType) {
            currentFilter = filterType;
            
            // Reapply styling to filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'text-white');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });
            
            const activeBtn = document.getElementById(`btn-${filterType}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-slate-100', 'text-slate-600');
                activeBtn.classList.add('bg-slate-800', 'text-white');
            }

            renderList();
        }

        // Delete a specific tile from a category list
        function deleteItem(event, catId, itemId) {
            // Stop bubble click event from propagating to item row toggle
            event.stopPropagation();
            event.preventDefault();

            // Find target category
            const categoryIndex = checklistData.findIndex(cat => cat.id === catId);
            if (categoryIndex !== -1) {
                const initialLength = checklistData[categoryIndex].items.length;
                checklistData[categoryIndex].items = checklistData[categoryIndex].items.filter(item => item.id !== itemId);
                
                if (checklistData[categoryIndex].items.length < initialLength) {
                    // Clean up tracking status
                    delete userProgress[itemId];
                    saveStructure();
                    saveProgress();
                    showToast('Item deleted successfully.');
                }
            }
        }

        // Custom interactive add-item dialog controllers
        function openAddItemModal(categoryId) {
            document.getElementById('target-category-id').value = categoryId;
            document.getElementById('item-title').value = '';
            document.getElementById('item-desc').value = '';
            
            const modal = document.getElementById('add-item-modal');
            modal.classList.add('modal-active');
            document.getElementById('item-title').focus();
        }

        function closeAddItemModal() {
            const modal = document.getElementById('add-item-modal');
            modal.classList.remove('modal-active');
        }

        // Create customizable list entry from user modal submit
        function handleItemSubmit(event) {
            event.preventDefault();
            
            const categoryId = document.getElementById('target-category-id').value;
            const titleValue = document.getElementById('item-title').value.trim();
            const descValue = document.getElementById('item-desc').value.trim();

            if (!titleValue) {
                showToast('Item Name is required!', true);
                return;
            }

            const categoryIndex = checklistData.findIndex(cat => cat.id === categoryId);
            if (categoryIndex !== -1) {
                const generatedId = `custom-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
                const newItem = {
                    id: generatedId,
                    title: titleValue,
                    desc: descValue
                };

                checklistData[categoryIndex].items.push(newItem);
                userProgress[generatedId] = false; // Initialise as incomplete
                
                saveStructure();
                saveProgress();
                closeAddItemModal();
                showToast('Successfully added item!');
            } else {
                showToast('Error adding item: Category not found.', true);
            }
        }

        // Calculate progress statistics dynamically based on existing keys
        function getProgressStats() {
            let totalItems = 0;
            let totalCompleted = 0;
            const categoryStats = {};

            checklistData.forEach(category => {
                const catTotal = category.items.length;
                const catCompleted = category.items.filter(item => userProgress[item.id]).length;
                
                categoryStats[category.id] = {
                    total: catTotal,
                    completed: catCompleted,
                    percentage: catTotal > 0 ? Math.round((catCompleted / catTotal) * 100) : 0
                };

                totalItems += catTotal;
                totalCompleted += catCompleted;
            });

            return {
                total: totalItems,
                completed: totalCompleted,
                percentage: totalItems > 0 ? Math.round((totalCompleted / totalItems) * 100) : 0,
                categories: categoryStats
            };
        }

        // Sync application views
        function updateUI() {
            const stats = getProgressStats();
            
            // Smoothly animate header progress indicator
            document.getElementById('overall-progress-bar').style.width = `${stats.percentage}%`;
            document.getElementById('overall-percentage').textContent = `${stats.percentage}%`;

            // Adjust category specific metrics in header and bodies
            checklistData.forEach(category => {
                const catStats = stats.categories[category.id];
                const bar = document.getElementById(`progress-${category.id}`);
                const label = document.getElementById(`text-${category.id}`);
                
                if (bar) bar.style.width = `${catStats.percentage}%`;
                if (label) label.textContent = `${catStats.completed} / ${catStats.total}`;
            });

            renderList();
        }

        // Complete build workflow for checklist sections
        function renderList() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';

            const stats = getProgressStats();

            checklistData.forEach(category => {
                // Filter elements
                const filteredItems = category.items.filter(item => {
                    const isChecked = !!userProgress[item.id];
                    if (currentFilter === 'pending') return !isChecked;
                    if (currentFilter === 'completed') return isChecked;
                    return true; 
                });

                // Do not display empty categories when viewing filtered sections
                if (filteredItems.length === 0 && currentFilter !== 'all') return;

                const categoryStats = stats.categories[category.id] || { total: 0, completed: 0, percentage: 0 };

                // Build modern category wrap
                const section = document.createElement('section');
                section.className = 'bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden';
                
                // Section layout containing actionable headers and metrics
                let headerHTML = `
                    <div class="p-6 border-b border-slate-100 bg-slate-50 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <div class="flex items-center gap-2 flex-wrap">
                                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                                    <span class="w-3 h-3 rounded-full ${category.color}"></span>
                                    ${category.title}
                                </h2>
                                <button onclick="openAddItemModal('${category.id}')" class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-semibold text-emerald-700 bg-emerald-50 hover:bg-emerald-100 active:bg-emerald-200 rounded-md transition-colors border border-emerald-100/30">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path>
                                    </svg>
                                    Add Item
                                </button>
                            </div>
                            <p class="text-sm text-slate-500 mt-1 ml-5">${category.description}</p>
                        </div>
                        <div class="w-full md:w-48">
                            <div class="flex justify-between text-xs font-semibold text-slate-500 mb-1">
                                <span>Completed</span>
                                <span id="text-${category.id}">${categoryStats.completed} / ${categoryStats.total}</span>
                            </div>
                            <div class="w-full bg-slate-200 rounded-full h-2">
                                <div id="progress-${category.id}" class="${category.color} h-2 rounded-full transition-all duration-500 ease-out" style="width: ${categoryStats.percentage}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="divide-y divide-slate-100">
                `;

                // Render specific tiles of items
                let itemsHTML = '';
                if (filteredItems.length === 0) {
                     itemsHTML = `<div class="p-8 text-center text-slate-400 italic">No items found in this section view.</div>`;
                } else {
                    filteredItems.forEach(item => {
                        const isChecked = !!userProgress[item.id];
                        const textStyle = isChecked ? 'line-through text-slate-400' : 'text-slate-800';
                        const descStyle = isChecked ? 'opacity-50 text-slate-400' : 'text-slate-500';
                        const bgStyle = isChecked ? 'bg-slate-50/50' : 'bg-white hover:bg-slate-50/70';

                        // Checkbox separated dynamically from Delete Button inside absolute structure
                        itemsHTML += `
                            <div class="item-row flex items-start justify-between gap-4 p-5 transition-colors duration-150 ${bgStyle}">
                                <label class="flex items-start gap-4 cursor-pointer flex-1 select-none">
                                    <div class="pt-1">
                                        <input type="checkbox" class="custom-checkbox" 
                                            ${isChecked ? 'checked' : ''} 
                                            onchange="toggleItem('${item.id}')">
                                    </div>
                                    <div>
                                        <h3 class="font-semibold text-base transition-colors duration-150 ${textStyle}">${item.title}</h3>
                                        <p class="text-sm mt-1 transition-opacity duration-150 ${descStyle}">${item.desc || 'No description provided.'}</p>
                                    </div>
                                </label>
                                
                                <div class="flex items-center">
                                    <button onclick="deleteItem(event, '${category.id}', '${item.id}')" title="Remove item" class="p-2 text-slate-400 hover:text-red-500 rounded-lg hover:bg-red-50 active:bg-red-100 transition-all focus:outline-none" aria-label="Delete item">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                }

                section.innerHTML = headerHTML + itemsHTML + '</div>';
                container.appendChild(section);
            });
        }

        // Initialize client app logic
        window.onload = function() {
            renderList();
            updateUI();
        }
    </script>
</body>
</html>
